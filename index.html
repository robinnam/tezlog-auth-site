<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TezLog - Tesla Smart Logger</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #E82127, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 1.2rem;
            color: #888;
            max-width: 500px;
            line-height: 1.5;
        }
        .badge {
            margin-top: 2rem;
            padding: 10px 20px;
            border-radius: 30px;
            background-color: rgba(232, 33, 39, 0.1);
            color: #E82127;
            border: 1px solid rgba(232, 33, 39, 0.3);
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <h1>TezLog</h1>
    <p>가장 진보된 테슬라 스마트 데이터 로깅 솔루션<br>Tesla Fleet API 완벽 연동</p>
    <div class="badge">Official Tesla Partner Domain</div>
</body>
</html>
